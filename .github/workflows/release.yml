name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent two release runs from racing each other (e.g., double-push / re-run)
concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      # npm >= 9 supports provenance; keeping this to avoid runner/npm drift
      - name: Upgrade npm CLI (Trusted Publishing / provenance)
        run: npm i -g npm@11.5.1

      # Use pnpm via Corepack
      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@10.22.0 --activate

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release with zero-release
        uses: teles/zero-release@v1.1.1
        id: release
        env:
          NPM_CONFIG_PROVENANCE: true
          ZERO_RELEASE_NPM_ACCESS: public
        with:
          branches: main
          plugins: release-notes,changelog,package-json,git-commit,npm
